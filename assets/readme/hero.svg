<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentCheck — repository readiness for AI coding agents</title>
  <desc id="desc">A dark product banner showing AgentCheck converting repository evidence into a readiness score.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1120" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101927"/>
      <stop offset="1" stop-color="#070B12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B9F56A"/>
      <stop offset="1" stop-color="#55D6BE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <path d="M0 345C214 287 373 413 602 349C811 290 956 304 1200 223V460H0V345Z" fill="#B9F56A" fill-opacity=".035"/>
  <circle cx="1055" cy="48" r="220" fill="#55D6BE" fill-opacity=".045"/>
  <g transform="translate(72 66)">
    <rect width="62" height="62" rx="15" fill="url(#accent)"/>
    <path d="M20 42L29 19H36L45 42H38.5L36.8 37H28.2L26.5 42H20ZM30 31.5H35L32.5 24.5L30 31.5Z" fill="#07100D"/>
    <path d="M18 16H46" stroke="#07100D" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="154" y="106" fill="#F4F7F3" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="750" letter-spacing="-1">AgentCheck</text>
  <text x="72" y="198" fill="#F4F7F3" font-family="Inter,Segoe UI,sans-serif" font-size="57" font-weight="760" letter-spacing="-2.4">Is your repository ready</text>
  <text x="72" y="260" fill="url(#accent)" font-family="Inter,Segoe UI,sans-serif" font-size="57" font-weight="760" letter-spacing="-2.4">for AI coding agents?</text>
  <text x="74" y="313" fill="#9BAAAB" font-family="Inter,Segoe UI,sans-serif" font-size="20">Local. Deterministic. Evidence-first. No repository code execution.</text>
  <g transform="translate(74 355)">
    <rect width="310" height="48" rx="12" fill="#03060A" stroke="#263140"/>
    <text x="18" y="30" fill="#708090" font-family="Consolas,Menlo,monospace" font-size="16">$</text>
    <text x="39" y="30" fill="#E5EBE7" font-family="Consolas,Menlo,monospace" font-size="16">npx agentcheck scan .</text>
  </g>
  <g transform="translate(830 88)" filter="url(#shadow)">
    <rect width="294" height="294" rx="28" fill="#0D141E" stroke="#263140"/>
    <text x="28" y="43" fill="#819092" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="650" letter-spacing="1.7">AGENT READINESS</text>
    <text x="28" y="126" fill="#F4F7F3" font-family="Inter,Segoe UI,sans-serif" font-size="72" font-weight="760" letter-spacing="-3">94</text>
    <text x="119" y="126" fill="#667476" font-family="Inter,Segoe UI,sans-serif" font-size="26">/100</text>
    <rect x="28" y="151" width="238" height="8" rx="4" fill="#222D39"/>
    <rect x="28" y="151" width="224" height="8" rx="4" fill="url(#accent)"/>
    <g font-family="Inter,Segoe UI,sans-serif" font-size="14">
      <text x="28" y="201" fill="#97A5A6">18 deterministic rules</text>
      <text x="28" y="230" fill="#97A5A6">Every finding has evidence</text>
      <text x="28" y="259" fill="#97A5A6">CI-ready exit codes</text>
    </g>
    <circle cx="258" cy="197" r="5" fill="#B9F56A"/>
    <circle cx="258" cy="226" r="5" fill="#55D6BE"/>
    <circle cx="258" cy="255" r="5" fill="#7AA2F7"/>
  </g>
</svg>
