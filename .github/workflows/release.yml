name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run verify:release-tag -- "${{ github.ref_name }}"
      - run: npm run verify
      - run: npm run smoke:package
      - run: npm publish --access public --provenance
