name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: node dist/cli/main.js scan . --ci --min-score 90 --fail-on high --fail-on-incomplete
