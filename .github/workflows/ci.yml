name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: node dist/cli/main.js scan . --ci --min-score 90 --fail-on high --fail-on-incomplete

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run smoke:package

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run benchmark
